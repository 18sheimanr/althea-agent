name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_REGION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      CLOUD_RUN_SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
      ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      CONVERSATIONS_COLLECTION: ${{ vars.CONVERSATIONS_COLLECTION || 'agent_conversations' }}
      EVENTS_COLLECTION: ${{ vars.EVENTS_COLLECTION || 'agent_events' }}
      TWILIO_ALLOWED_FROM: ${{ vars.TWILIO_ALLOWED_FROM || '+15555550100' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      INTERNAL_HOOK_AUDIENCE: ${{ vars.INTERNAL_HOOK_AUDIENCE || 'https://your-service-xxxxx-uc.a.run.app/internal/events/agent-hook' }}
      TASKS_CALLER_SERVICE_ACCOUNT: ${{ vars.TASKS_CALLER_SERVICE_ACCOUNT || 'athena-cloudrun-runtime@your-gcp-project-id.iam.gserviceaccount.com' }}
      TWILIO_FROM_NUMBER: ${{ vars.TWILIO_FROM_NUMBER || '' }}
      TWILIO_MESSAGING_SERVICE_SID: ${{ vars.TWILIO_MESSAGING_SERVICE_SID || '' }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate required workflow variables
        run: |
          test -n "${GCP_PROJECT_ID}" || (echo "Missing repo variable: GCP_PROJECT_ID" && exit 1)
          test -n "${GCP_REGION}" || (echo "Missing repo variable: GCP_REGION" && exit 1)
          test -n "${CLOUD_RUN_SERVICE_NAME}" || (echo "Missing repo variable: CLOUD_RUN_SERVICE_NAME" && exit 1)
          test -n "${ARTIFACT_REPO}" || (echo "Missing repo variable: ARTIFACT_REPO" && exit 1)
          test -n "${IMAGE_NAME}" || (echo "Missing repo variable: IMAGE_NAME" && exit 1)
          test -n "${TWILIO_AUTH_TOKEN}" || (echo "Missing repo secret: TWILIO_AUTH_TOKEN" && exit 1)
          test -n "${TWILIO_ACCOUNT_SID}" || (echo "Missing repo secret: TWILIO_ACCOUNT_SID" && exit 1)
          test -n "${GOOGLE_CLOUD_PROJECT}" || (echo "Missing runtime env: GOOGLE_CLOUD_PROJECT" && exit 1)
          test -n "${GOOGLE_CLOUD_LOCATION}" || (echo "Missing runtime env: GOOGLE_CLOUD_LOCATION" && exit 1)

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy image to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE_URI}" \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --service-account "${{ secrets.RUNTIME_SERVICE_ACCOUNT }}" \
            --set-env-vars "GCP_PROJECT_ID=${GCP_PROJECT_ID},GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT},GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION},GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI},CONVERSATIONS_COLLECTION=${CONVERSATIONS_COLLECTION},EVENTS_COLLECTION=${EVENTS_COLLECTION},TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN},TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID},TWILIO_ALLOWED_FROM=${TWILIO_ALLOWED_FROM},TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER},TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID},GEMINI_MODEL=${GEMINI_MODEL},INTERNAL_HOOK_AUDIENCE=${INTERNAL_HOOK_AUDIENCE},TASKS_CALLER_SERVICE_ACCOUNT=${TASKS_CALLER_SERVICE_ACCOUNT}"
